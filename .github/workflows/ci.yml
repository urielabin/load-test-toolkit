name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      # Real end-to-end check: starts the fixture server and drives an
      # actual load run against it through the built CLI, then verifies
      # the CLI's threshold-based exit code (the CI-gating contract).
      - name: Start fixture server
        run: nohup npx tsx tests/fixtures/server.ts > fixture-server.log 2>&1 &
      - name: Wait for fixture server
        run: until curl -sf http://localhost:4000/health; do sleep 0.5; done
      - name: Run CLI against the fixture server
        run: node dist/cli/index.js run scenarios/smoke.yaml --json report.json --html report.html
      - run: test -s report.json
      - run: test -s report.html
